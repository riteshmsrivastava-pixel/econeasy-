    #ee-workspace{grid-template-columns:1fr !important;}
    #ee-sidebar{position:static !important;max-height:none !important;}

  @media(max-width:560px){

    #ee-title{font-size:26px !important;}
    #ee-btn-name{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

    body{background:#fff !important;}
    header, main, #ee-scrim, #ee-menu { display:none !important; }
    #ee-print { display:block !important; }
    @page { margin: 12mm; }
  }
</style>

<script type="text/x-dc" data-dc-script>
/* ============================================================================
   Econeasy, multi-chapter engine.
   Each chapter is a `spec` (see CHAPTERS). The Component is a generic engine
   that builds the plot, controls, sliders, drag and the worked-example sidebar
   from the active spec. The chart math is ported from the original econ-lab
   modules; only the palette and layout follow the Econeasy design.
   ============================================================================ */

var C = {
  paper:'#FBF6EE', ink:'#2B2622', mut:'#8A8076', line:'#C9BCA9', grid:'#F2EADD',
  dem:'#DD6B4D', sup:'#2A9D8F', amb:'#E0A33D', pur:'#9C6FB0', pink:'#D9617E', good:'#1E7468',
  demF:'rgba(221,107,77,.13)', supF:'rgba(42,157,143,.13)', ambF:'rgba(224,163,61,.16)',
  pinkF:'rgba(217,97,126,.22)', purF:'rgba(156,111,176,.14)', dash:'#C9BCA9'
};
var MONO = "'Space Mono',monospace";
var DISP = "'Bricolage Grotesque'";
function f2(n){ return Math.round(n*100)/100; }

/* ============================== CHAPTER SPECS ============================== */
var CHAPTERS = [

/* 01, SUPPLY & DEMAND */
{
  key:'sd', icon:'📐', sbTitle:'Find the equilibrium',
  QMAX:100, PMAX:100, xlabel:'Quantity', ylabel:'Price ($)',
  init:{ dInt:90, dSlope:0.8, sInt:10, sSlope:0.7 },
  legend:[{c:C.dem,t:'Demand'},{c:C.sup,t:'Supply'},{c:C.amb,t:'Equilibrium',dot:true}],
  chipA:{id:'eqP',label:'PRICE'}, chipB:{id:'eqQ',label:'QUANTITY'}, footer:{id:'ts',label:'Total surplus'},
  metricLabels:['Price','Quantity'],
  sliders:[{k:'dInt',label:'Demand intercept',min:40,max:130,step:1,color:C.dem,dec:0},{k:'dSlope',label:'Demand slope',min:0.1,max:4,step:0.1,color:C.dem,dec:1},{k:'sInt',label:'Supply intercept',min:-20,max:55,step:1,color:C.sup,dec:0},{k:'sSlope',label:'Supply slope',min:0.1,max:3,step:0.1,color:C.sup,dec:1}],
  tune:true, tip:'Tip: grab the red or green line in the chart and drag it to shift the curve.',
  scenarios:[
    {id:'dRise',label:'↑ Demand',cause:'Demand rises',target:function(self){return {dInt:self.clamp(self.st.dInt+28,40,130)};},msg:"<b>Demand shifts right.</b> Buyers want more at every price, so the cross slides up the supply curve, <span style='color:#1E7468;font-weight:700'>price ↑ and quantity ↑</span>."},
    {id:'dFall',label:'↓ Demand',cause:'Demand falls',target:function(self){return {dInt:self.clamp(self.st.dInt-28,40,130)};},msg:"<b>Demand shifts left.</b> Buyers want less at every price, the equilibrium slides down: <span style='color:#C0492B;font-weight:700'>price ↓ and quantity ↓</span>."},
    {id:'sRise',label:'↑ Supply',cause:'Supply rises',target:function(self){return {sInt:self.clamp(self.st.sInt-20,-20,55)};},msg:"<b>Supply shifts right.</b> Cheaper inputs or better tech. Sliding down the demand curve: <span style='color:#C0492B;font-weight:700'>price ↓</span> but <span style='color:#1E7468;font-weight:700'>quantity ↑</span>."},
    {id:'sFall',label:'↓ Supply',cause:'Supply falls',target:function(self){return {sInt:self.clamp(self.st.sInt+22,-20,55)};},msg:"<b>Supply shifts left.</b> Costs rose or a bad harvest. Climbing the demand curve: <span style='color:#1E7468;font-weight:700'>price ↑</span>, <span style='color:#C0492B;font-weight:700'>quantity ↓</span>."},
  ],
  play:['dRise','dFall','sRise','sFall'],
  reset:{target:{dInt:90,dSlope:0.8,sInt:10,sSlope:0.7},cause:'Reset',msg:'Back to the starting market. Drag a curve, fire a scenario, or change the numbers on the right.'},
  eq:function(s){ var Q=(s.dInt-s.sInt)/(s.dSlope+s.sSlope); return {Q:Q,P:s.sInt+s.sSlope*Q}; },
  metrics:function(self,s){ var e=this.eq(s); return [e.P,e.Q]; },
  anchor:function(self,s){ var e=this.eq(s); return {q:e.Q,p:e.P}; },
  draw:function(self,s){
    var P=self.P, el=self.el, L=self.layer, T=self.lbl, e=this.eq(s), Q=e.Q, Pp=e.P;
    var dQ1=s.dInt/s.dSlope, dx1=Math.min(dQ1,P.QMAX), dy1=s.dInt-s.dSlope*dx1, sx1=P.QMAX, sy1=s.sInt+s.sSlope*sx1;
    L.appendChild(el('polygon',{points:P.x(0)+','+P.y(Pp)+' '+P.x(0)+','+P.y(s.dInt)+' '+P.x(Q)+','+P.y(Pp),fill:C.demF}));
    L.appendChild(el('polygon',{points:P.x(0)+','+P.y(Pp)+' '+P.x(0)+','+P.y(s.sInt)+' '+P.x(Q)+','+P.y(Pp),fill:C.supF}));
    L.appendChild(el('line',{x1:P.x(0),y1:P.y(s.dInt),x2:P.x(dx1),y2:P.y(dy1),stroke:C.dem,'stroke-width':3.5,'stroke-linecap':'round'}));
    L.appendChild(el('line',{x1:P.x(0),y1:P.y(s.sInt),x2:P.x(sx1),y2:P.y(sy1),stroke:C.sup,'stroke-width':3.5,'stroke-linecap':'round'}));
    L.appendChild(el('line',{x1:P.x(Q),y1:P.y(Pp),x2:P.x(Q),y2:P.y(0),stroke:C.amb,'stroke-width':1.5,'stroke-dasharray':'4 4'}));
    L.appendChild(el('line',{x1:P.x(Q),y1:P.y(Pp),x2:P.x(0),y2:P.y(Pp),stroke:C.amb,'stroke-width':1.5,'stroke-dasharray':'4 4'}));
    L.appendChild(el('circle',{cx:P.x(Q),cy:P.y(Pp),r:6.5,fill:C.amb,stroke:'#fff','stroke-width':2.5}));
    self.tag(T,P.x(dx1)-4,P.y(dy1)-7,'D',C.dem,'end'); self.tag(T,P.x(sx1)-5,P.y(sy1)+1,'S',C.sup,'end');
    self.setT('eqP','$'+Pp.toFixed(0)); self.setT('eqQ',Q.toFixed(0));
    var cs=0.5*Q*(s.dInt-Pp), ps=0.5*Q*(Pp-s.sInt); self.setT('ts','$'+Math.max(0,cs+ps).toFixed(0));
  },
  drag:function(self){ return {
    hit:function(c){ var dP=self.st.dInt-self.st.dSlope*c.q, sP=self.st.sInt+self.st.sSlope*c.q; return Math.abs(c.p-dP)<8?'d':(Math.abs(c.p-sP)<8?'s':false); },
    move:function(h,c){ if(h==='d') self.st.dInt=self.clamp(c.p+self.st.dSlope*c.q,40,130); else self.st.sInt=self.clamp(c.p-self.st.sSlope*c.q,-20,55); return h==='d'?'Demand shift':'Supply shift'; } }; },
  problem:{
    intro:'Demand <b style="color:#2B2622">P = a − bQ</b>, supply <b style="color:#2B2622">P = c + dQ</b>. Pick a market or edit any number, the graph and the solution update live.',
    keyHtml:'<b style="color:#2B2622">Big idea:</b> equilibrium is where buyers’ and sellers’ plans line up. The gap (a − c) and combined steepness (b + d) set how much trades.',
    inputs:[{key:'a',label:'Demand intercept <b>a</b>',value:90,step:1},{key:'b',label:'Demand slope <b>b</b>',value:0.8,step:0.1},{key:'c',label:'Supply intercept <b>c</b>',value:10,step:1},{key:'d',label:'Supply slope <b>d</b>',value:0.7,step:0.1}],
    presets:[{name:'Everyday good',values:{a:90,b:0.8,c:10,d:0.7}},{name:'Luxury',values:{a:100,b:4,c:20,d:1}},{name:'Commodity',values:{a:80,b:2,c:10,d:0.5}},{name:'Demand boom',values:{a:130,b:0.8,c:10,d:0.7}},{name:'Supply crunch',values:{a:90,b:0.8,c:55,d:3}}],
    solve:function(v){ var a=v.a,b=v.b,c=v.c,d=v.d; if(b+d<=0||a<=c) return {answer:"<b>No positive equilibrium:</b> demand starts below supply (a ≤ c), so nothing trades.",steps:[]};
      var Q=(a-c)/(b+d),P=c+d*Q;
      return {scenario:'Demand <b>P = '+f2(a)+' − '+f2(b)+'Q</b>, supply <b>P = '+f2(c)+' + '+f2(d)+'Q</b>.',answer:'Equilibrium: <b>Q* = '+f2(Q)+'</b> units at <b>P* = $'+f2(P)+'</b>.',
        steps:[{h:'1 · Set demand = supply',p:"The one price where buyers' and sellers' plans match.",calc:f2(a)+' − '+f2(b)+'Q = '+f2(c)+' + '+f2(d)+'Q'},{h:'2 · Solve for Q*',p:'Collect the Q terms, then divide.',calc:f2(a-c)+' = ('+f2(b)+' + '+f2(d)+')Q\nQ* = '+f2(a-c)+' / '+f2(b+d)+' = '+f2(Q)},{h:'3 · Back-substitute for P*',p:'Plug Q* into either equation.',calc:'P* = '+f2(c)+' + '+f2(d)+'·'+f2(Q)+' = $'+f2(P)}]}; },
    sync:function(self,v){ self.st.dInt=v.a; self.st.dSlope=Math.max(0.05,v.b); self.st.sInt=v.c; self.st.sSlope=Math.max(0.05,v.d); }
  }
},

/* 02, ELASTICITY */
{
  key:'elastic', icon:'📈', sbTitle:'Measure how much buyers react',
  QMAX:100, PMAX:100, xlabel:'Quantity sold', ylabel:'Price ($)', A:100, B:1, init:{ Q:50 },
  legend:[{c:C.dem,t:'Demand line'},{c:C.amb,t:'Money spent (P×Q)'}],
  chipA:{id:'elE',label:'SENSITIVITY |E|'}, chipB:{id:'elR',label:'MONEY SPENT'}, footer:null,
  strip:[{id:'elP',label:'price'},{id:'elQ',label:'quantity'}],
  metricLabels:['Sensitivity','Money spent'],
  sliders:null, tune:false, tip:'Tip: drag the gold dot up and down the demand line.',
  scenarios:[
    {id:'up',label:'⬆ Sensitive',cause:'Up the line',target:function(){return {Q:20};},msg:"<b>Up here buyers are very sensitive (|E| &gt; 1).</b> Price is high, few are buying. A small price cut wins lots of extra sales, so cutting the price <span style='color:#1E7468;font-weight:700'>brings in more money</span>."},
    {id:'mid',label:'● Middle',cause:'The middle',target:function(){return {Q:50};},msg:"<b>Right in the middle (|E| = 1)</b> the gold box of total spending is as big as it gets. Nudging the price either way barely changes the money taken in."},
    {id:'down',label:'⬇ Stubborn',cause:'Down the line',target:function(){return {Q:80};},msg:"<b>Down here buyers barely react (|E| &lt; 1).</b> Price is low, almost everyone already buys. Cutting the price adds few sales, so you'd <span style='color:#C0492B;font-weight:700'>take in less money</span>, raise the price instead."},
  ],
  play:['up','mid','down'],
  reset:{target:{Q:50},cause:'Reset',msg:'Back to the middle of the demand line, where total spending is largest.'},
  metrics:function(self,s){ var Pp=this.A-this.B*s.Q; return [Pp/(this.B*s.Q), Pp*s.Q]; },
  anchor:function(self,s){ return {q:s.Q,p:this.A-this.B*s.Q}; },
  draw:function(self,s){
    var P=self.P, el=self.el, L=self.layer, T=self.lbl, a=this.A, b=this.B, Pp=a-b*s.Q;
    L.appendChild(el('rect',{x:P.x(0),y:P.y(Pp),width:P.x(s.Q)-P.x(0),height:P.y(0)-P.y(Pp),fill:C.ambF}));
    L.appendChild(el('line',{x1:P.x(0),y1:P.y(a),x2:P.x(a/b),y2:P.y(0),stroke:C.dem,'stroke-width':3.5,'stroke-linecap':'round'}));
    L.appendChild(el('line',{x1:P.x(s.Q),y1:P.y(Pp),x2:P.x(s.Q),y2:P.y(0),stroke:C.amb,'stroke-width':1.5,'stroke-dasharray':'4 4'}));
    L.appendChild(el('line',{x1:P.x(s.Q),y1:P.y(Pp),x2:P.x(0),y2:P.y(Pp),stroke:C.amb,'stroke-width':1.5,'stroke-dasharray':'4 4'}));
    L.appendChild(el('circle',{cx:P.x(s.Q),cy:P.y(Pp),r:7,fill:C.amb,stroke:'#fff','stroke-width':2.5}));

  sd:{plain:"Buyers want more of something when it's cheap. Sellers want to make more when it's expensive. The price settles at the one spot where the amount people want to buy exactly equals the amount sellers want to sell, the <b>equilibrium</b>.",
    example:"Strawberries at a market. Price them at $10 a box and almost no one buys, boxes pile up. Price them at $1 and they sell out in minutes, leaving people empty-handed. Around $3, the last box sells just as the last happy customer leaves. That's the equilibrium price.",
    words:[["Demand","how much people want to buy at each price (more when cheaper)."],["Supply","how much sellers want to sell at each price (more when pricier)."],["Equilibrium","the price where buyers' and sellers' plans match, nothing left over, no one missing out."]]},
  elastic:{plain:"Elasticity measures how <b>touchy</b> buyers are about price. If a small price rise makes lots of people stop buying, demand is <b>elastic</b> (sensitive). If people keep buying no matter what, it's <b>inelastic</b> (stubborn).",
    example:"Raise the price of one brand of soda and shoppers just grab a different brand, very sensitive. Raise the price of life-saving medicine and people still buy it because they have to, barely sensitive. That difference is elasticity.",
    words:[["Elastic","buyers react a lot; a price cut can earn you more because so many more people buy."],["Inelastic","buyers barely react; you can raise the price and still keep most of your sales."],["|E| (sensitivity)","the number that captures this. Above 1 = sensitive, below 1 = stubborn."]]},
  consumer:{plain:"You have a limited amount of money and many things you'd like. You spend it on the mix that makes you happiest. As something gets more expensive, you naturally buy less of it and more of the cheaper stuff.",
    example:"You've got $20 for lunch this week. Coffee and sandwiches both tempt you. If coffee gets pricier, you'll buy fewer coffees and a few more sandwiches, landing on the combo that feels best for your $20.",
    words:[["Budget line","every combination of two things you can just afford with your money."],["Best buy (optimal bundle)","the affordable mix that makes you happiest."],["Happiness (utility)","economists' word for how satisfied a choice makes you."]]},
  costs:{plain:"Making things costs money in two flavors: costs that stay the same no matter how much you make, and costs that grow with each extra item. Spreading the fixed costs over more items makes each item cheaper, up to a point.",
    example:"A bakery pays rent and buys an oven whether it bakes 1 loaf or 1,000 (fixed cost). Flour and electricity go up with every loaf (variable cost). Baking more spreads the rent across more loaves, so each loaf gets cheaper, until the kitchen gets crowded and costs creep back up.",
    words:[["Fixed cost","doesn't change with how much you make (rent, machines)."],["Variable cost","grows with each item (ingredients, power)."],["Marginal cost (\"next loaf\")","what it costs to make just one more."],["Average cost (\"typical loaf\")","total cost shared across every item."]]},
  profit:{plain:"Keep making more as long as the next item sells for more than it costs to make. Stop right when one more would cost more than it earns. That's the point of biggest profit.",
    example:"A juice stall earns $3 per cup. Early cups are cheap to make, so each adds profit. As it squeezes more, ingredients and effort per cup rise. The moment the next cup would cost more than $3 to make, the stall stops, one more would lose money.",
    words:[["Profit","money in minus money out: (price − average cost) × number sold."],["Marginal cost","the cost of one more item."],["Shut-down point","if the price can't even cover the make-each-item cost, it's better to close than keep selling."]]},
  monopoly:{plain:"A monopoly is the <b>only</b> seller of something, so it controls the price. It picks the price that earns it the most, making fewer items and charging more than a competitive market would. Some people who'd happily have bought at a fair price get priced out; those lost sales are value the world misses out on.",
    example:"One company owns the only bridge into town and charges a toll. A busy road might let 100 cars cross cheaply. The bridge owner sets a high toll so only 60 cars cross, earning more per car but turning away 40 drivers who'd gladly have paid a smaller toll. Those 40 trips are the trades left on the table.",
    words:[["Monopoly","the single seller of a product, with no direct competition."],["Markup","how far the price sits above what it actually cost to make the item."],["Marginal revenue (\"extra money\")","the extra cash from selling one more. For a monopoly it drops fast, because to sell more it must lower the price for everyone."],["Deadweight loss (\"lost value\")","the worth of all the sales that never happen because the price is set too high."]]},
  game:{plain:"When two sides each make a choice and the result depends on what <b>both</b> do, smart players can still end up in a spot that's worse for everyone, because each is just protecting itself.",
    example:"Two rival shops decide whether to hold prices or start a price war. If both hold, both do well. But each fears the other will undercut, so both cut prices, and both earn less than if they'd just held. Each acted sensibly, yet together they lost. That's the prisoner's dilemma.",
    words:[["Dominant strategy","a move that's your best choice no matter what the other side does."],["Nash equilibrium","the outcome where neither side wants to change its move alone."],["Prisoner's dilemma","a classic case where both protecting themselves leaves both worse off than cooperating would."]]},
  tax:{plain:"When the government taxes a sale, it splits one price into two: a higher price buyers pay and a lower price sellers keep, with the tax in between. Who feels it more depends on who can more easily walk away.",
    example:"Put a $2 tax on coffee. Buyers might pay $1 more and sellers keep $1 less, split evenly. But if coffee drinkers are addicted and can't quit, they swallow most of the tax, while the café barely feels it.",
    words:[["Tax incidence","who actually bears the cost of a tax, regardless of who hands it to the government."],["Tax wedge","the gap the tax drives between the buyer's price and the seller's price."],["Lost sales (deadweight loss)","purchases that no longer happen because the tax made things pricier."]]},
  pricectrl:{plain:"Sometimes a law caps a price (a <b>ceiling</b>) or sets a minimum (a <b>floor</b>). If the cap is below the natural price, more people want it than sellers will provide, a shortage. If the floor is above the natural price, sellers offer more than people want, a surplus.",
    example:"<b>Ceiling:</b> rent control caps rents low, so lots of people want flats but few are offered, a shortage and long waitlists. <b>Floor:</b> a minimum wage sets pay above what some employers would offer, so more people want jobs than there are jobs, a labor surplus (unemployment).",
    words:[["Price ceiling","a legal maximum price (e.g. rent control)."],["Price floor","a legal minimum price (e.g. minimum wage)."],["Binding","when the rule actually changes things (a ceiling below, or floor above, the natural price)."],["Shortage / surplus","too many buyers and not enough goods, or too many goods and not enough buyers."]]},
  extern:{plain:"Sometimes a sale hurts (or helps) people who aren't the buyer or seller. When it hurts bystanders, the market makes too much of it, because the seller doesn't count the harm. Charging the seller exactly that harm fixes it.",
    example:"A factory makes cheap products but its smoke bothers the whole neighborhood. The factory only counts its own costs, so it makes a lot. If it had to pay for the harm its smoke causes, it would make less, the amount that's actually best for everyone, neighbors included.",
    words:[["Externality","a cost (or benefit) that lands on people outside the deal."],["True cost (social cost)","the seller's own cost plus the harm to others."],["Corrective charge (Pigouvian tax)","a fee equal to the harm that nudges the seller to the right amount."]]},
  trade:{plain:"Two people (or countries) both end up with more stuff if each focuses on the job they give up the least to do, then they swap. What matters isn't who's faster, it's who sacrifices less.",
    example:"Two roommates split chores. One is great at both cooking and cleaning, the other slower at both. They still both win if the fast one focuses on whichever chore the slow one is comparatively worst at, and they trade. Each does what they \"skip the least\" for, swap, and both have more free time than going it alone.",
    words:[["Opportunity cost (\"skip-cost\")","what you give up to do something else."],["Comparative advantage","being the one who gives up the least to make a particular thing, this decides who makes what, not raw speed."],["Gains from trade","both sides ending up better off after specializing and swapping."]]}
};

var TIPS = {
  sd:["Set demand = supply and solve for P, then plug back in for Q.","A shift moves the whole curve; a price change just slides along it.","Demand-right → P and Q both up. Supply-right → P down, Q up."],
  elastic:["Elasticity = % change in quantity ÷ % change in price (use the average/midpoint to stay symmetric).","|E| > 1 elastic → cut price to earn more; |E| < 1 inelastic → raise price.","On a straight demand line the top is elastic, the bottom inelastic, the middle unit-elastic (max revenue)."],
  consumer:["Spend a fixed slice of income on each good: a on X, (1−a) on Y.","Quantity of a good = money spent on it ÷ its price.","Best bundle = where the budget line just touches the highest indifference curve (MRS = price ratio)."],
  costs:["ATC = (fixed + variable) ÷ quantity; MC = change in total cost ÷ change in quantity.","MC below ATC pulls the average down; MC above pushes it up, they cross at minimum ATC.","Fixed cost per unit always falls as you make more."],
  profit:["Make units until MC = price (one more would cost more than it sells for).","Profit = (price − ATC) × quantity.","Shut-down rule: price < AVC → stop; AVC ≤ price < ATC → keep going at a loss."],
  monopoly:["MR has the same intercept as demand but twice the slope: MR = a − 2bQ.","Set MR = MC for the quantity, then read the price off the demand curve.","Markup: (P − MC)/P = −1/elasticity, less elastic demand → bigger markup."],
  game:["Find each player's best reply to each of the rival's choices.","A dominant strategy beats the alternative no matter what the rival does.","Nash = the cell where neither wants to switch alone. A true dilemma needs T > R > P > S."],
  tax:["A tax opens a wedge: buyer price − seller price = tax.","New quantity Qt = (a − c − t)/(b + d); read Pb off demand, Ps off supply.","The more inelastic (steeper) side bears more; equal slopes → 50/50."],
  pricectrl:["A ceiling binds below the market price (→ shortage); a floor binds above it (→ surplus).","At the controlled price, Qd from demand and Qs from supply; the short side sets how much trades.","Deadweight loss = ½ × (lost quantity) × (price gap) at the traded amount."],
  extern:["Social cost = the seller's private cost + the harm to others.","Market makes too much; the efficient amount is where demand meets social cost.","A Pigouvian tax equal to the harm restores the efficient quantity."],
  trade:["Opportunity cost of a good = how much of the other good you give up to make one more.","Whoever has the lower opportunity cost should specialize in that good (comparative advantage).","Trade at a rate between the two opportunity costs; both end up beyond their own frontier."]
};

          <div style="font-family:${DISP};font-weight:700;font-size:20px;">Econeasy · Cheat Sheet</div>
          <div style="color:#8A8076;font-size:11.5px;">${meta.eb}</div>
        </div>
        <h1 style="font-family:${DISP};font-weight:700;font-size:26px;margin:14px 0 6px;">${name}</h1>
        <p style="color:#555;font-size:12.5px;line-height:1.5;margin:0 0 10px;">${lead}</p>
        <div style="border:1px solid #EADFCD;border-radius:10px;padding:10px 12px;">${svgHTML}</div>
        ${tipsHtml}
        ${keyHtml ? `${h2('Key idea')}<div style="font-size:13px;line-height:1.55;">${keyHtml}</div>` : ''}
        ${wordsHtml}
        ${h2('Worked examples (with solutions)')}${examplesHtml}
        <div style="margin-top:24px;color:#A2937D;font-size:10.5px;text-align:center;">Generated from Econeasy · ${name}. Use your browser's "Save as PDF".</div>
      </div>`;
    const pm = document.getElementById('ee-print'); if (pm) pm.innerHTML = sheet;
    window.print();
  }

  wireNav() {
    const menu = document.getElementById('ee-menu'), scrim = document.getElementById('ee-scrim'), btn = document.getElementById('ee-chapter-btn');
    const groups = ['Markets & Demand', 'The Firm', 'Market Structure', 'Policy & Trade'];
    const tints = { 'Markets & Demand':'#DD6B4D', 'The Firm':'#2A9D8F', 'Market Structure':'#E0A33D', 'Policy & Trade':'#9C6FB0' };
    let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:18px 24px;">';
    groups.forEach((g) => { html += `<div><div style="font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:${tints[g]};margin:0 0 8px;">${g}</div><div style="display:flex;flex-direction:column;gap:2px;">`;
      this.CH.forEach((c, i) => { if (c.grp !== g) return; html += `<button data-go="${i}" style="cursor:pointer;text-align:left;border:none;background:transparent;border-radius:9px;padding:7px 9px;display:flex;align-items:center;gap:9px;font-size:13.5px;color:#3A332C;font-weight:500;"><span style="font-family:'Space Mono';font-size:11px;color:#A2937D;">${c.n}</span>${this.specName(i)}</button>`; });
      html += '</div></div>'; });
    html += '</div>'; menu.innerHTML = html;
    const closeMenu = () => { menu.style.display = 'none'; scrim.style.display = 'none'; };
    const openMenu = () => { menu.style.display = 'block'; scrim.style.display = 'block'; this.markActive(); };
    btn.addEventListener('click', () => { menu.style.display === 'block' ? closeMenu() : openMenu(); });
    scrim.addEventListener('click', closeMenu);
    menu.querySelectorAll('[data-go]').forEach((b) => { b.addEventListener('click', () => { this.selectChapter(parseInt(b.dataset.go)); closeMenu(); });
      b.addEventListener('mouseenter', () => { b.style.background = '#F8F1E6'; });
      b.addEventListener('mouseleave', () => { if (parseInt(b.dataset.go) !== this.cur) b.style.background = 'transparent'; }); });
    document.getElementById('ee-prev').addEventListener('click', () => this.selectChapter((this.cur + this.CH.length - 1) % this.CH.length));
    document.getElementById('ee-next').addEventListener('click', () => this.selectChapter((this.cur + 1) % this.CH.length));
  }
  markActive() {
    document.querySelectorAll('#ee-menu [data-go]').forEach((b) => { const on = parseInt(b.dataset.go) === this.cur;
      b.style.background = on ? '#FBE7DD' : 'transparent'; b.style.color = on ? '#C0492B' : '#3A332C'; b.style.fontWeight = on ? '700' : '500'; });
  }

  renderVals() { return {}; }
}
</script>
</body>
</html>
